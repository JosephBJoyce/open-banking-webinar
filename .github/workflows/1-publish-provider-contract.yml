name: 1 · Publish Provider Contract (BDCT)

on:
  push:
    branches:
      - main
      - '**'
    paths:
      - 'openapi/**'
      - '.github/workflows/1-publish-provider-contract.yml'
  workflow_dispatch:

# Triggered automatically when Swagger Studio syncs a new version of the OpenAPI
# spec to this repository. Publishes the spec to PactFlow so cross-contract
# verification runs against all registered consumer pacts.

jobs:
  publish-contract:
    name: Self-verify & publish to PactFlow
    runs-on: ubuntu-latest

    env:
      PACT_BROKER_BASE_URL: ${{ vars.PACT_BROKER_BASE_URL }}
      PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
      PROVIDER_NAME: open-banking-api

    steps:
      - uses: actions/checkout@v4

      - name: Publish provider contract to PactFlow (BDCT)
        run: |
          docker run --rm \
            -e PACT_BROKER_BASE_URL \
            -e PACT_BROKER_TOKEN \
            -v "$GITHUB_WORKSPACE:/workspace" \
            pactfoundation/pact-cli:latest \
            pactflow publish-provider-contract \
              /workspace/openapi/open-banking-api.yml \
              --provider "$PROVIDER_NAME" \
              --provider-app-version "${{ github.sha }}" \
              --branch "${{ github.ref_name }}" \
              --content-type application/yaml \
              --verification-exit-code 0

      - name: Check can-i-deploy to production
        run: |
          docker run --rm \
            -e PACT_BROKER_BASE_URL \
            -e PACT_BROKER_TOKEN \
            pactfoundation/pact-cli:latest \
            pact-broker can-i-deploy \
              --pacticipant "$PROVIDER_NAME" \
              --version "${{ github.sha }}" \
              --to-environment production \
              --retry-while-unknown 30 \
              --retry-interval 10

      - name: Record deployment to production
        if: github.ref_name == 'main'
        run: |
          docker run --rm \
            -e PACT_BROKER_BASE_URL \
            -e PACT_BROKER_TOKEN \
            pactfoundation/pact-cli:latest \
            pact-broker record-deployment \
              --pacticipant "$PROVIDER_NAME" \
              --version "${{ github.sha }}" \
              --environment production
