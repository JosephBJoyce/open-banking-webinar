name: 3 · Deploy (with contract & standardization gates)

on:
  workflow_run:
    workflows: ['2 · Functional Tests (Swagger Functional Testing)']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

# Deployment pipeline for the Open Banking API.
#
# Gates (must pass before any deployment proceeds):
#   1. can-i-deploy  — PactFlow cross-contract verification confirms this provider
#                      version is compatible with all registered consumer pacts.
#   2. Standardization scan — SmartBear MCP Server checks the OpenAPI spec against
#                             the organisation's API governance ruleset (PSD2 / Open
#                             Banking guidelines). Fails the pipeline on critical issues.
#
# The actual deployment step is representative — replace the "Deploy API" step with
# your real deployment mechanism (Kubernetes, AWS API Gateway, Azure APIM, etc.).

jobs:
  # ── Gate 1: Contract compatibility ────────────────────────────────────────────
  can-i-deploy:
    name: Gate 1 — can-i-deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    env:
      PACT_BROKER_BASE_URL: ${{ vars.PACT_BROKER_BASE_URL }}
      PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
      PROVIDER_NAME: open-banking-api
      TARGET_ENV: ${{ inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: can-i-deploy
        run: |
          echo "Checking PactFlow cross-contract compatibility for $PROVIDER_NAME @ ${{ github.sha }} → $TARGET_ENV"
          docker run --rm \
            -e PACT_BROKER_BASE_URL \
            -e PACT_BROKER_TOKEN \
            pactfoundation/pact-cli:latest \
            pact-broker can-i-deploy \
              --pacticipant "$PROVIDER_NAME" \
              --version "${{ github.sha }}" \
              --to-environment "$TARGET_ENV" \
              --retry-while-unknown 30 \
              --retry-interval 10

  # ── Gate 2: API Standardization scan ──────────────────────────────────────────
  standardization-gate:
    name: Gate 2 — API standardization scan
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run API standardization scan via SmartBear MCP
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMARTBEAR_API_KEY: ${{ secrets.SMARTBEAR_API_KEY }}
        run: |
          # Use Claude Code with the SmartBear MCP server to run the standardization
          # scan on the OpenAPI spec and fail the build on any critical violations.
          claude --allowedTools swagger_scan_api_standardization -p "
            Run a standardization scan on the file openapi/open-banking-api.yml.
            The organisation's governance ruleset enforces PSD2 and Open Banking
            API guidelines. Exit with code 1 and print a summary of violations if
            any issues of severity CRITICAL or ERROR are found. If only warnings
            are present, print them and exit 0.
          "

  # ── Deploy ────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: [can-i-deploy, standardization-gate]
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: https://api.bank.example.com/open-banking/v1

    env:
      PACT_BROKER_BASE_URL: ${{ vars.PACT_BROKER_BASE_URL }}
      PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
      PROVIDER_NAME: open-banking-api
      TARGET_ENV: ${{ inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy API
        run: |
          # ── Replace this block with your real deployment mechanism ──────────
          # Examples:
          #   kubectl apply -f k8s/ --namespace open-banking
          #   aws apigateway import-rest-api --body fileb://openapi/open-banking-api.yml
          #   az apim api import --path /open-banking/v1 ...
          # ───────────────────────────────────────────────────────────────────
          echo "Deploying open-banking-api @ ${{ github.sha }} to $TARGET_ENV"
          echo "Deployment successful"

      - name: Record deployment in PactFlow
        run: |
          docker run --rm \
            -e PACT_BROKER_BASE_URL \
            -e PACT_BROKER_TOKEN \
            pactfoundation/pact-cli:latest \
            pact-broker record-deployment \
              --pacticipant "$PROVIDER_NAME" \
              --version "${{ github.sha }}" \
              --environment "$TARGET_ENV"

      - name: Trigger portal docs publish
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '4-publish-portal-docs.yml',
              ref: context.ref,
              inputs: {
                environment: '${{ env.TARGET_ENV }}',
                version: '${{ github.sha }}'
              }
            })
